<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>2026 영업과표 대시보드</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'Apple SD Gothic Neo', 'Malgun Gothic', sans-serif;
    background: #f0f2f5; color: #333; font-size: 13px;
  }

  .sticky-top {
    position: sticky; top: 0; z-index: 100;
    box-shadow: 0 2px 8px rgba(0,0,0,0.12);
  }
  .header {
    background: linear-gradient(135deg, #1B3A5C, #2E75B6);
    color: #fff; padding: 14px 24px;
    display: flex; justify-content: space-between; align-items: center;
  }
  .header h1 { font-size: 18px; }
  .header-right { display: flex; align-items: center; gap: 12px; }
  .total-badge {
    background: rgba(255,255,255,0.2);
    padding: 5px 14px; border-radius: 20px;
    font-size: 13px; font-weight: 600;
  }
  .btn {
    background: #fff; color: #1B3A5C; border: none;
    padding: 7px 16px; border-radius: 6px;
    font-size: 12px; font-weight: 600; cursor: pointer;
  }
  .btn:hover { background: #e8f0fe; }
  .btn:disabled { opacity: 0.5; cursor: not-allowed; }

  .tabs {
    display: flex; padding: 0 24px; background: #fff;
    border-bottom: 1px solid #e0e0e0;
  }
  .tab {
    padding: 10px 20px; font-size: 13px; font-weight: 600;
    cursor: pointer; border-bottom: 3px solid transparent; color: #888;
  }
  .tab:hover { color: #333; }
  .tab.active { color: #2E75B6; border-bottom-color: #2E75B6; }

  .filter-bar {
    padding: 10px 24px; background: #fff;
    border-bottom: 1px solid #e8e8e8;
    display: flex; gap: 6px; align-items: center; flex-wrap: wrap;
  }
  .chip {
    padding: 4px 12px; border-radius: 20px; font-size: 11px;
    font-weight: 600; cursor: pointer; border: 2px solid #ddd; background: #fff;
  }
  .chip:hover { border-color: #aaa; }
  .chip.active { color: #fff; }
  .chip[data-d="all"].active { background: #333; border-color: #333; }
  .chip[data-d="SG_Part"].active { background: #2E75B6; border-color: #2E75B6; }
  .chip[data-d="문화기획실"].active { background: #27AE60; border-color: #27AE60; }
  .chip[data-d="프로젝트기획실"].active { background: #8E44AD; border-color: #8E44AD; }
  .chip[data-d="기타"].active { background: #95A5A6; border-color: #95A5A6; }

  .view { display: none; padding: 16px 24px; }
  .view.active { display: block; }

  /* Timeline */
  .timeline { overflow-x: auto; }
  .gantt { border-collapse: collapse; width: 100%; min-width: 1100px; table-layout: fixed; }
  .gantt th, .gantt td { border: 1px solid #e0e0e0; text-align: center; vertical-align: middle; }
  .gantt thead th {
    background: #1B3A5C; color: #fff; font-size: 12px; font-weight: 700;
    padding: 8px 2px;
  }
  .gantt .col-name { width: 200px; min-width: 200px; text-align: left; padding: 6px 8px; }
  .gantt .col-pm { width: 60px; min-width: 60px; font-size: 11px; }
  .gantt .col-budget { width: 85px; min-width: 85px; font-size: 11px; }

  .dept-row td {
    background: #f1f5f9; font-weight: 800; font-size: 13px;
    padding: 8px 10px; text-align: left; color: #444;
    border-bottom: 2px solid #cbd5e1;
  }
  .dept-badge {
    display: inline-block; padding: 2px 10px; border-radius: 4px;
    color: #fff; font-size: 12px;
  }

  .p-row td { padding: 4px 2px; height: 36px; user-select: none; }
  .p-row:hover .cell-empty { background: #f0f4ff; }
  .p-row:hover .col-name { background: #f0f4ff; }
  .p-row:hover .col-budget { background: #f0f4ff; }
  .p-row:hover .col-pm { background: #f0f4ff; }
  .p-row .col-name {
    font-weight: 600; font-size: 12px;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }

  .cell-bid { background: #3b82f6; color: #fff; font-size: 10px; font-weight: 700; }
  .cell-prep { background: #93c5fd; }
  .cell-event { background: #f97316; color: #fff; font-size: 10px; font-weight: 700; }
  .cell-note { background: #fbbf24; color: #7c2d12; font-size: 9px; font-weight: 600; }
  .cell-empty { background: #fff; }

  .p-row.SG_Part .col-name { border-left: 4px solid #2E75B6; }
  .p-row.문화기획실 .col-name { border-left: 4px solid #27AE60; }
  .p-row.프로젝트기획실 .col-name { border-left: 4px solid #8E44AD; }
  .p-row.기타 .col-name { border-left: 4px solid #95A5A6; }

  .legend {
    display: flex; gap: 16px; padding: 10px 24px; flex-wrap: wrap;
    background: #f0f2f5; border-bottom: 1px solid #e0e0e0;
  }
  .legend-item { display: flex; align-items: center; gap: 4px; font-size: 11px; }
  .legend-box { width: 18px; height: 12px; border-radius: 2px; }

  /* Diagram */
  .diagram-wrap { max-width: 900px; margin: 0 auto; }
  .summary-bars {
    display: flex; gap: 24px; justify-content: center;
    padding: 24px; background: #fff; border-radius: 12px;
    box-shadow: 0 2px 8px rgba(0,0,0,0.06); margin-bottom: 24px;
  }
  .bar-item { display: flex; flex-direction: column; align-items: center; gap: 6px; min-width: 130px; }
  .bar-track { width: 64px; height: 140px; background: #f0f0f0; border-radius: 8px; position: relative; overflow: hidden; }
  .bar-fill { position: absolute; bottom: 0; width: 100%; border-radius: 8px; transition: height 0.8s; }
  .bar-label { font-size: 13px; font-weight: 700; }
  .bar-value { font-size: 12px; color: #666; }
  .bar-pct { font-size: 12px; font-weight: 700; }

  .bubble-area { display: flex; flex-wrap: wrap; gap: 20px; justify-content: center; padding: 20px 0; }
  .dept-bubble {
    border-radius: 50%; display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    cursor: pointer; box-shadow: 0 4px 20px rgba(0,0,0,0.1);
    transition: transform 0.3s;
  }
  .dept-bubble:hover { transform: scale(1.05); }
  .dept-bubble-label { color: #fff; font-weight: 800; font-size: 15px; text-shadow: 0 1px 3px rgba(0,0,0,0.3); }
  .dept-bubble-budget { color: rgba(255,255,255,0.9); font-size: 13px; font-weight: 600; }
  .dept-bubble-count { color: rgba(255,255,255,0.8); font-size: 11px; margin-top: 2px; }

  .detail-panel {
    background: #fff; border-radius: 12px; padding: 20px;
    box-shadow: 0 2px 12px rgba(0,0,0,0.08); margin-top: 20px; display: none;
  }
  .detail-panel.active { display: block; }
  .detail-panel h3 { font-size: 15px; margin-bottom: 12px; }
  .detail-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(240px, 1fr)); gap: 10px; }
  .d-card { background: #f8f9fa; border-radius: 8px; padding: 10px; border-left: 4px solid #ddd; }
  .d-card-name { font-weight: 700; font-size: 12px; margin-bottom: 3px; }
  .d-card-info { font-size: 11px; color: #666; }

  .failed-section {
    margin-top: 16px; padding: 12px; background: #fef2f2;
    border-radius: 8px; border: 1px solid #fca5a5;
  }
  .failed-section h4 { font-size: 13px; color: #991b1b; margin-bottom: 8px; }

  .overlay {
    position: fixed; inset: 0; background: rgba(255,255,255,0.85);
    display: flex; align-items: center; justify-content: center;
    z-index: 999; font-size: 15px; font-weight: 600; color: #2E75B6;
  }
  .overlay.hidden { display: none; }

  /* 로그인 화면 */
  .login-screen {
    position: fixed; inset: 0; background: linear-gradient(135deg, #1B3A5C, #2E75B6);
    display: flex; align-items: center; justify-content: center; z-index: 9999;
  }
  .login-screen.hidden { display: none; }
  .login-box {
    background: #fff; border-radius: 16px; padding: 40px 36px;
    box-shadow: 0 20px 60px rgba(0,0,0,0.3); text-align: center;
    min-width: 320px;
  }
  .login-box h2 { font-size: 18px; color: #1B3A5C; margin-bottom: 6px; }
  .login-box p { font-size: 12px; color: #888; margin-bottom: 24px; }
  .login-box input {
    width: 100%; padding: 12px 14px; border: 2px solid #e0e0e0;
    border-radius: 8px; font-size: 14px; outline: none;
    transition: border-color 0.2s;
  }
  .login-box input:focus { border-color: #2E75B6; }
  .login-box .login-btn {
    width: 100%; margin-top: 14px; padding: 12px;
    background: linear-gradient(135deg, #1B3A5C, #2E75B6);
    color: #fff; border: none; border-radius: 8px;
    font-size: 14px; font-weight: 700; cursor: pointer;
  }
  .login-box .login-btn:hover { opacity: 0.9; }
  .login-error { color: #e74c3c; font-size: 12px; margin-top: 8px; display: none; }
</style>
</head>
<body>

<!-- 로그인 화면 -->
<div class="login-screen" id="loginScreen">
  <div class="login-box">
    <h2>2026 영업과표 대시보드</h2>
    <p>문화기획상상(주) 사업본부</p>
    <input type="password" id="pwInput" placeholder="비밀번호를 입력하세요" onkeydown="if(event.key==='Enter')doLogin()">
    <button class="login-btn" onclick="doLogin()">로그인</button>
    <div class="login-error" id="loginError">비밀번호가 올바르지 않습니다.</div>
  </div>
</div>

<div id="appWrap" style="display:none">
<div class="sticky-top">
  <div class="header">
    <h1>2026 영업과표 대시보드</h1>
    <div class="header-right">
      <div class="total-badge" id="totalBadge">-</div>
      <button class="btn" id="btnRefresh" onclick="refresh()">수정사항 반영</button>
    </div>
  </div>

  <div class="tabs">
    <div class="tab active" data-v="timeline" onclick="switchTab('timeline')">타임라인</div>
    <div class="tab" data-v="diagram" onclick="switchTab('diagram')">예산 다이어그램</div>
  </div>

  <div class="filter-bar">
    <span style="font-size:11px;color:#888;">부서:</span>
    <div class="chip active" data-d="all" onclick="setFilter(this)">전체</div>
    <div class="chip" data-d="SG_Part" onclick="setFilter(this)">SG_Part</div>
    <div class="chip" data-d="문화기획실" onclick="setFilter(this)">문화기획실</div>
    <div class="chip" data-d="프로젝트기획실" onclick="setFilter(this)">프로젝트기획실</div>
    <div class="chip" data-d="기타" onclick="setFilter(this)">기타</div>
  </div>
</div>

<div class="view active" id="viewTimeline">
  <div class="legend">
    <div class="legend-item"><div class="legend-box" style="background:#3b82f6"></div>입찰준비</div>
    <div class="legend-item"><div class="legend-box" style="background:#93c5fd"></div>행사준비(진행)</div>
    <div class="legend-item"><div class="legend-box" style="background:#f97316"></div>행사일</div>
    <div class="legend-item"><div class="legend-box" style="background:#fbbf24"></div>기타(제안발표 등)</div>
  </div>
  <div class="timeline" id="timelineWrap"></div>
  <div class="failed-section" id="failedSection" style="display:none">
    <h4>입찰 실패</h4>
    <div id="failedList"></div>
  </div>
</div>

<div class="view" id="viewDiagram">
  <div class="diagram-wrap">
    <div class="summary-bars" id="summaryBars"></div>
    <div class="bubble-area" id="bubbleArea"></div>
    <div class="detail-panel" id="detailPanel"></div>
  </div>
</div>

<div class="overlay" id="overlay"><span>데이터 로딩 중...</span></div>
</div><!-- /appWrap -->

<script>
/* ══════════════════════════════════════
   비밀번호 보호 (SHA-256 해시)
   ══════════════════════════════════════ */
var PW_HASH = '543442f2d39bbc8a46e9c1b3dee668f587c20bae7770aac57bc75fd98c739d65';

async function sha256(text) {
  var enc = new TextEncoder().encode(text);
  var buf = await crypto.subtle.digest('SHA-256', enc);
  return Array.from(new Uint8Array(buf)).map(function(b){return b.toString(16).padStart(2,'0');}).join('');
}

var loginAttempts = 0;
var lockoutUntil = 0;

async function doLogin() {
  var now = Date.now();
  if (now < lockoutUntil) {
    var sec = Math.ceil((lockoutUntil - now) / 1000);
    document.getElementById('loginError').textContent = sec + '초 후 다시 시도하세요.';
    document.getElementById('loginError').style.display = 'block';
    return;
  }
  var pw = document.getElementById('pwInput').value;
  var hash = await sha256(pw);
  if (hash === PW_HASH) {
    sessionStorage.setItem('dashboard_auth', 'ok');
    document.getElementById('loginScreen').classList.add('hidden');
    document.getElementById('appWrap').style.display = '';
    loginAttempts = 0;
    refresh();
  } else {
    loginAttempts++;
    if (loginAttempts >= 5) {
      lockoutUntil = now + 30000;
      document.getElementById('loginError').textContent = '5회 실패. 30초 후 다시 시도하세요.';
    } else {
      document.getElementById('loginError').textContent = '비밀번호가 올바르지 않습니다. (' + loginAttempts + '/5)';
    }
    document.getElementById('loginError').style.display = 'block';
    document.getElementById('pwInput').value = '';
    document.getElementById('pwInput').focus();
  }
}

// 세션 체크 - 이미 로그인했으면 바로 진입
if (sessionStorage.getItem('dashboard_auth') === 'ok') {
  document.getElementById('loginScreen').classList.add('hidden');
  document.getElementById('appWrap').style.display = '';
}

/* ── HTML 이스케이프 (XSS 방지) ── */
function esc(str) {
  if (!str) return '';
  return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

/* ══════════════════════════════════════
   Google Sheets 게시 CSV URL
   "웹에 게시" 후 아래 URL을 교체하세요
   ══════════════════════════════════════ */
var SHEET_CSV_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vSYbml6l-WYYPuNU2hVvSEojs0x455An7SS95iGOdUcsQSZatnPCUD1cAyRAdt4eeqe0UsUMTXg5eAn/pub?gid=135095325&single=true&output=csv';

var D = {
  projects: [], failed: [], filter: 'all',
  MONTHS: ['1월','2월','3월','4월','5월','6월','7월','8월','9월','10월','11월','12월'],
  COLORS: {'SG_Part':'#2E75B6','문화기획실':'#27AE60','프로젝트기획실':'#8E44AD','기타':'#95A5A6'},
  DEPT_ORDER: ['SG_Part','문화기획실','프로젝트기획실','기타']
};

/* ── CSV 파싱 ── */
function parseCSV(text) {
  var lines = text.split('\n');
  var result = [];
  for (var i = 0; i < lines.length; i++) {
    var line = lines[i].trim();
    if (!line) continue;
    var row = [];
    var inQuote = false;
    var cell = '';
    for (var j = 0; j < line.length; j++) {
      var ch = line[j];
      if (ch === '"') {
        inQuote = !inQuote;
      } else if (ch === ',' && !inQuote) {
        row.push(cell.trim());
        cell = '';
      } else {
        cell += ch;
      }
    }
    row.push(cell.trim());
    result.push(row);
  }
  return result;
}

/* ── 데이터 로드 ── */
function refresh() {
  var btn = document.getElementById('btnRefresh');
  btn.disabled = true; btn.textContent = '로딩...';
  document.getElementById('overlay').classList.remove('hidden');

  fetch(SHEET_CSV_URL)
    .then(function(r) { return r.text(); })
    .then(function(csv) {
      var rows = parseCSV(csv);
      processData(rows);
      render();
      btn.disabled = false; btn.textContent = '수정사항 반영';
      document.getElementById('overlay').classList.add('hidden');
    })
    .catch(function(e) {
      alert('데이터 로딩 실패: ' + e.message);
      btn.disabled = false; btn.textContent = '수정사항 반영';
      document.getElementById('overlay').classList.add('hidden');
    });
}

function processData(rows) {
  // 헤더 행 찾기
  var headerIdx = -1;
  for (var i = 0; i < rows.length; i++) {
    for (var j = 0; j < rows[i].length; j++) {
      if (rows[i][j].indexOf('담당부서') >= 0) { headerIdx = i; break; }
    }
    if (headerIdx >= 0) break;
  }
  if (headerIdx < 0) return;

  var headers = rows[headerIdx];
  var colDept = -1, colName = -1, colBudget = -1, colPM = -1;
  var monthCols = [];

  for (var c = 0; c < headers.length; c++) {
    var h = headers[c];
    if (h === '담당부서') colDept = c;
    else if (h === '사업명') colName = c;
    else if (h.indexOf('사업금액') >= 0 || h.indexOf('예산') >= 0) colBudget = c;
    else if (h.indexOf('PM') >= 0) colPM = c;
    else if (h.match(/^\d{1,2}월$/)) monthCols.push({idx: c, label: h});
  }
  monthCols.sort(function(a, b) { return parseInt(a.label) - parseInt(b.label); });

  D.projects = [];
  D.failed = [];
  var isFailed = false;

  for (var r = headerIdx + 1; r < rows.length; r++) {
    var row = rows[r];
    var dept = (row[colDept] || '').trim();
    var name = (row[colName] || '').trim();

    if (dept === '입찰실패' || name === '입찰실패') { isFailed = true; continue; }
    if (!dept || !name) continue;

    var months = [];
    for (var mi = 0; mi < monthCols.length; mi++) {
      months.push((row[monthCols[mi].idx] || '').trim());
    }
    while (months.length < 12) months.push('');

    var budgetStr = colBudget >= 0 ? (row[colBudget] || '') : '';
    var budgetNum = parseInt(budgetStr.replace(/[^0-9]/g, '')) || 0;
    var pm = colPM >= 0 ? (row[colPM] || '').trim() : '';

    var p = { dept: dept, name: name, months: months, budget: budgetNum, pm: pm };
    if (isFailed) D.failed.push(p); else D.projects.push(p);
  }
}

/* ── 렌더링 ── */
function render() {
  var total = 0;
  fp().forEach(function(p) { total += p.budget; });
  document.getElementById('totalBadge').textContent = '총 ' + fmt(total) + ' (' + fp().length + '건)';
  renderTimeline();
  renderDiagram();
}

function fp() {
  if (D.filter === 'all') return D.projects;
  return D.projects.filter(function(p) { return p.dept === D.filter; });
}

function fmt(n) {
  if (!n) return '-';
  if (n >= 100000000) return (n/100000000).toFixed(1) + '억';
  if (n >= 10000000) return (n/10000000).toFixed(1) + '천만';
  if (n >= 10000) return Math.round(n/10000).toLocaleString() + '만';
  return n.toLocaleString() + '원';
}

function setFilter(el) {
  document.querySelectorAll('.chip').forEach(function(c){c.classList.remove('active');});
  el.classList.add('active'); D.filter = el.dataset.d; render();
}

function switchTab(v) {
  document.querySelectorAll('.tab').forEach(function(t){ t.classList.toggle('active', t.dataset.v === v); });
  document.querySelectorAll('.view').forEach(function(el){el.classList.remove('active');});
  document.getElementById('view' + v.charAt(0).toUpperCase() + v.slice(1)).classList.add('active');
}

function cellType(val) {
  if (!val) return 'empty';
  if (val.indexOf('입찰') >= 0) return 'bid';
  if (val === '▸▸▸' || val === '▸▸▶') return 'prep';
  if (val.indexOf('행사준비') >= 0) return 'prep';
  if (val.indexOf('행사일') >= 0) return 'event';
  if (val.indexOf('제안') >= 0) return 'note';
  if (val.match(/\d/)) return 'event';
  return 'note';
}

function cellClass(t) {
  return {bid:'cell-bid',prep:'cell-prep',event:'cell-event',note:'cell-note',empty:'cell-empty'}[t]||'cell-empty';
}

function cellLabel(val, t) {
  if (t === 'bid') return '입찰';
  if (t === 'prep') return '';
  if (t === 'event') return val.replace(/\*행사일/g,'').replace(/\*/g,'').trim() || '행사';
  if (t === 'note') return val.replace(/\*/g,'').trim();
  return '';
}

/* ── Timeline ── */
function renderTimeline() {
  var projects = fp();
  var grouped = {};
  D.DEPT_ORDER.forEach(function(d) { grouped[d] = []; });
  projects.forEach(function(p) {
    if (!grouped[p.dept]) grouped[p.dept] = [];
    grouped[p.dept].push(p);
  });

  var h = '<table class="gantt"><thead><tr>';
  h += '<th class="col-name">사업명</th>';
  D.MONTHS.forEach(function(m) { h += '<th>' + m + '</th>'; });
  h += '<th class="col-budget">사업금액</th><th class="col-pm">PM</th>';
  h += '</tr></thead><tbody>';

  D.DEPT_ORDER.forEach(function(dept) {
    var list = grouped[dept];
    if (!list || list.length === 0) return;
    var color = D.COLORS[dept] || '#999';
    var deptTotal = 0;
    list.forEach(function(p) { deptTotal += p.budget; });

    h += '<tr class="dept-row"><td colspan="15">';
    h += '<span class="dept-badge" style="background:' + color + '">' + esc(dept) + '</span>';
    h += ' &nbsp; ' + list.length + '건 · ' + fmt(deptTotal) + '</td></tr>';

    list.forEach(function(p) {
      h += '<tr class="p-row ' + esc(p.dept).replace(/\s/g,'') + '">';
      h += '<td class="col-name" title="' + esc(p.name) + '">' + esc(p.name) + '</td>';
      for (var i = 0; i < 12; i++) {
        var val = p.months[i] || '';
        var t = cellType(val);
        h += '<td class="' + cellClass(t) + '">' + esc(cellLabel(val, t)) + '</td>';
      }
      h += '<td class="col-budget" style="color:#c0392b;font-weight:600">' + fmt(p.budget) + '</td>';
      h += '<td class="col-pm">' + esc(p.pm) + '</td></tr>';
    });
  });

  h += '</tbody></table>';
  document.getElementById('timelineWrap').innerHTML = h;

  var sec = document.getElementById('failedSection');
  if (D.failed.length > 0 && D.filter === 'all') {
    sec.style.display = 'block';
    var fh = '';
    D.failed.forEach(function(p) { if (p.name) fh += '<span style="margin-right:12px;font-size:12px;">' + esc(p.name) + '</span>'; });
    document.getElementById('failedList').innerHTML = fh;
  } else { sec.style.display = 'none'; }
}

/* ── Diagram ── */
function renderDiagram() {
  var projects = fp();
  var depts = {};
  projects.forEach(function(p) {
    if (!depts[p.dept]) depts[p.dept] = {budget:0,count:0,projects:[]};
    depts[p.dept].budget += p.budget; depts[p.dept].count++; depts[p.dept].projects.push(p);
  });
  var total = 0;
  Object.keys(depts).forEach(function(d){total += depts[d].budget;});
  var keys = Object.keys(depts).sort(function(a,b){return depts[b].budget - depts[a].budget;});
  var max = keys.length > 0 ? depts[keys[0]].budget : 1;

  var bh = '';
  keys.forEach(function(d) {
    var info = depts[d], pct = total>0?(info.budget/total*100).toFixed(1):0;
    var ht = Math.max(10, info.budget/max*100), c = D.COLORS[d]||'#999';
    bh += '<div class="bar-item"><div class="bar-pct">'+pct+'%</div>';
    bh += '<div class="bar-track"><div class="bar-fill" style="height:'+ht+'%;background:'+c+'"></div></div>';
    bh += '<div class="bar-label">'+esc(d)+'</div><div class="bar-value">'+fmt(info.budget)+'</div>';
    bh += '<div class="bar-value">'+info.count+'건</div></div>';
  });
  document.getElementById('summaryBars').innerHTML = bh;

  var bb = '';
  keys.forEach(function(d) {
    var info = depts[d], ratio = total>0?info.budget/total:0.25;
    var sz = Math.max(140, Math.sqrt(ratio)*380), c = D.COLORS[d]||'#999';
    bb += '<div class="dept-bubble" style="width:'+sz+'px;height:'+sz+'px;background:'+c+'" onclick="showDetail(\''+esc(d)+'\')">';
    bb += '<div class="dept-bubble-label">'+esc(d)+'</div><div class="dept-bubble-budget">'+fmt(info.budget)+'</div>';
    bb += '<div class="dept-bubble-count">'+info.count+'건</div></div>';
  });
  document.getElementById('bubbleArea').innerHTML = bb;
}

function showDetail(dept) {
  var list = fp().filter(function(p){return p.dept===dept;});
  var c = D.COLORS[dept]||'#999';
  var panel = document.getElementById('detailPanel');
  var h = '<h3 style="color:'+c+'">'+esc(dept)+' ('+list.length+'건)</h3><div class="detail-grid">';
  list.sort(function(a,b){return b.budget-a.budget;});
  list.forEach(function(p) {
    h += '<div class="d-card" style="border-left-color:'+c+'"><div class="d-card-name">'+esc(p.name)+'</div>';
    h += '<div class="d-card-info">'+fmt(p.budget)+' · '+esc(p.pm||'-')+'</div></div>';
  });
  h += '</div>';
  panel.innerHTML = h; panel.classList.add('active');
  panel.scrollIntoView({behavior:'smooth'});
}

// 이미 로그인 상태면 자동 로드
if (sessionStorage.getItem('dashboard_auth') === 'ok') { refresh(); }
